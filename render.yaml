services:
  - type: web
    name: openclaw
    runtime: docker
    dockerCommand: "sed -i 's/\"loopback\"/\"lan\"/g' ~/.openclaw/openclaw.json || true && sed -i 's/\"allowedOrigins\": \\[\\]/\"dangerouslyAllowHostHeaderOriginFallback\": true/g' ~/.openclaw/openclaw.json || true && node openclaw.mjs gateway --allow-unconfigured"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
