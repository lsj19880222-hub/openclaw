services:
  - type: web
    name: openclaw
    runtime: docker
    dockerCommand: "mkdir -p /tmp/.openclaw && printf '{\"gateway\":{\"bind\":\"lan\",\"controlUi\":{\"dangerouslyAllowHostHeaderOriginFallback\":true}}}' > /tmp/.openclaw/openclaw.json && node openclaw.mjs gateway --port 8080 --allow-unconfigured"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
