services:
  - type: web
    name: openclaw
    runtime: docker
    dockerCommand: "node openclaw.mjs gateway --bind lan --port 8080 --allow-unconfigured -c gateway.controlUi.allowedOrigins=\"[\\\"https://openclaw-z6ka.onrender.com\\\"]\""
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /tmp/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
